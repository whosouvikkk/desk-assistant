<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Witch Agent Control Center</title>
    <style>
        body {
            background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden;
        }
        .container {
            text-align: center; background: #1e1e1e; padding: 40px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid #333;
        }
        h1 { margin-bottom: 10px; color: #a855f7; }
        p { color: #a1a1aa; margin-bottom: 30px; }
        .launch-btn {
            background: linear-gradient(135deg, #a855f7, #ec4899); color: white; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: transform 0.2s;
        }
        .launch-btn:hover { transform: translateY(-2px); }
        
        #witch-avatar {
            display: none; position: fixed; bottom: 20px; right: 20px; width: 120px; height: 120px;
            background-image: url('witch.png'); /* Vercel will find the image in your root folder */
            background-size: contain; background-repeat: no-repeat; background-position: center;
            cursor: grab; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.6)); z-index: 1000;
        }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>Arcane OS</h1>
        <p>Your screen-reading coding companion.</p>
        <button class="launch-btn" onclick="launchAgent()">Launch Assistant</button>
        <p id="status" style="margin-top: 15px; font-size: 14px; color: #a855f7; display: none;"></p>
    </div>

    <div id="witch-avatar"></div>

    <script>
        const avatar = document.getElementById('witch-avatar');
        
        function launchAgent() {
            const statusText = document.getElementById('status');
            avatar.style.display = 'block'; 
            statusText.style.display = 'block';
            statusText.innerText = "Attempting to wake desktop agent...";

            // Use 127.0.0.1 instead of localhost to bypass Vercel's HTTPS mixed-content blocks
            fetch('http://127.0.0.1:8000/launch', { method: 'POST' })
                .then(response => {
                    statusText.innerText = "Desktop Agent Launched Successfully!";
                })
                .catch(error => {
                    statusText.style.color = '#ef4444';
                    statusText.innerText = "Local Python server not running. Start agent.py on your laptop!";
                });
        }
    </script>
</body>
</html>
