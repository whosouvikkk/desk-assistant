<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane Assistant</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 { color: #a855f7; margin-bottom: 5px; font-size: 24px; }
        p { color: #a1a1aa; font-size: 14px; margin-bottom: 40px; }

        /* The Witch Assistant Widget */
        .witch-container {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }

        .witch-avatar {
            width: 140px;
            height: 140px;
            background-image: url('witch.png'); /* Reads witch.png from your root folder */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.6));
            transition: transform 0.2s;
        }

        .witch-container:hover .witch-avatar {
            transform: scale(1.05);
        }

        /* Ambient Pulsing Ring behind the witch */
        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130px;
            height: 130px;
            border: 2px solid #a855f7;
            border-radius: 50%;
            animation: pulse 2s infinite;
            z-index: -1;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulse {
            0% { width: 130px; height: 130px; opacity: 0.6; }
            100% { width: 180px; height: 180px; opacity: 0; }
        }

        .log-box {
            margin-top: 30px;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            font-size: 13px;
            color: #e4e4e7;
            width: 80%;
            min-height: 40px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Arcane OS</h1>
        <p>Click the witch to summon assistance</p>

        <!-- Interactive Avatar Element -->
        <div class="witch-container" onclick="askAssistant()">
            <div class="pulse-ring"></div>
            <div class="witch-avatar"></div>
        </div>

        <!-- Box to show response messages -->
        <div class="log-box" id="response-output">
            System Idle. Waiting for trigger...
        </div>
    </div>

    <script>
        function askAssistant() {
            const output = document.getElementById('response-output');
            
            // Open a pop-up input question frame
            const promptValue = window.prompt("What is your request, traveler?");
            
            if (promptValue) {
                output.innerText = `Processing request: "${promptValue}"... (You can add custom action logic here later!)`;
            }
        }
    </script>
</body>
</html>
